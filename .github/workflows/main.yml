# This is a basic workflow to build robot code.
name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      swerve: ${{ steps.changes.outputs.swerve }}
      backup-swerve: ${{ steps.changes.outputs.backup_swerve }}
      tank-timed: ${{ steps.changes.outputs.tank_timed }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v2
      id: changes
      with:
        filters: |
          swerve:
            - '26NSK-Swerve-Java-Imported/**'
          backup_swerve:
            - 'Backup-Swerve/**'
          tank_timed:
            - 'Java-Tank/Java-Tank_Timed/**'

  build-swerve:
    needs: detect-changes
    if: needs.detect-changes.outputs.swerve == 'true'
    runs-on: ubuntu-22.04
    container: wpilib/roborio-cross-ubuntu:2025-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Add repository to git safe directories
      run: git config --global --add safe.directory $GITHUB_WORKSPACE
    - name: Grant execute permission for gradlew
      run: chmod +x 26NSK-Swerve-Java-Imported/gradlew
    - name: Build Swerve Robot
      run: cd 26NSK-Swerve-Java-Imported && ./gradlew build

  build-backup-swerve:
    needs: detect-changes
    if: needs.detect-changes.outputs.backup_swerve == 'true'
    runs-on: ubuntu-22.04
    container: wpilib/roborio-cross-ubuntu:2025-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Add repository to git safe directories
      run: git config --global --add safe.directory $GITHUB_WORKSPACE
    - name: Grant execute permission for gradlew
      run: chmod +x Backup-Swerve/gradlew
    - name: Build Backup Swerve Robot
      run: cd Backup-Swerve && ./gradlew build

  build-tank-timed:
    needs: detect-changes
    if: needs.detect-changes.outputs.tank_timed == 'true'
    runs-on: ubuntu-22.04
    container: wpilib/roborio-cross-ubuntu:2025-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Add repository to git safe directories
      run: git config --global --add safe.directory $GITHUB_WORKSPACE
    - name: Grant execute permission for gradlew
      run: chmod +x Java-Tank/Java-Tank_Timed/gradlew
    - name: Build Tank Robot
      run: cd Java-Tank/Java-Tank_Timed && ./gradlew build
